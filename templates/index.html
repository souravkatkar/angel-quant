<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Quant</title>
    
    <!-- Tailwind CSS & DaisyUI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Enterprise Light Minimalism */
        /* Sage & Stone Theme */
        :root {
            color-scheme: light;
            --primary: #4a6c6f;
            --primary-hover: #3d5a5c;
            --btn-text: #ffffff;
            --bg-color: #d1d5db;
            --surface: #f8faf9;
            --surface-header: #8a9a98;
            --sidebar-bg: #2b3233;
            --sidebar-text: #e2e8f0;
            --sidebar-active-glow: rgba(136, 171, 165, 0.4);
            --sidebar-active-border: rgba(136, 171, 165, 0.6);
            --text-main: #1f2937;
            --text-muted: #64748b;
            --text-header: #ffffff;
            --border: #d1d5db;
            --success: #10b981;
            --danger: #ef4444;
            --row-alt: #f8faf9;
            --row-hover: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --input-bg: #ffffff;
            --btn-bg: #2b3233;
            --btn-hover: #1f2526;
        }
        
        [data-theme="dark"] {
            color-scheme: dark;
            --primary: #6b8e8f;
            --primary-hover: #82a8a8;
            --btn-text: #ffffff;
            --bg-color: #262d2e;
            --surface: #333b3c;
            --surface-header: #2b3233;
            --sidebar-bg: #1e2425;
            --sidebar-text: #e2e8f0;
            --sidebar-active-glow: rgba(107, 142, 143, 0.4);
            --sidebar-active-border: rgba(107, 142, 143, 0.6);
            --text-main: #f8faf9;
            --text-muted: #a3afae;
            --text-header: #ffffff;
            --border: #424c4e;
            --row-alt: #333b3c;
            --row-hover: #424c4e;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            --input-bg: #2b3233;
            --btn-bg: #4a5759;
            --btn-hover: #5d6d70;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-main);
            background-color: var(--bg-color);
            background-image: url("{{ url_for('static', filename='bg.png') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-blend-mode: multiply; /* Helps the image blend with light/dark theme colors */
            margin: 0 !important;
            padding: 0;
            line-height: 1.5;
            transition: background-color 0.3s ease, color 0.3s ease;
            height: 100vh;
            overflow: hidden;
        }

        .layout-wrapper {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            transition: background-color 0.3s ease, border-color 0.3s ease;
            flex-shrink: 0;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar-header {
            margin-bottom: 40px;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        
        .app-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .card {
            background: var(--surface);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
        }

        .card-header {
            background: var(--surface-header);
            color: var(--text-header);
            padding: 16px 24px;
            font-weight: 600;
            font-size: 1.1rem;
            text-align: center;
        }

        .card-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        

        h1 { 
            margin: 0; 
            color: var(--sidebar-text);
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        
        .theme-toggle {
            background: transparent !important;
            color: var(--text-main) !important;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1.25rem;
            cursor: pointer;
            padding: 8px 12px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .theme-toggle:hover {
            background: var(--row-hover) !important;
        }
        
        /* Form Layout */
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 24px;
            width: 100%;
        }
        .form-row {
            display: flex;
            gap: 24px;
            width: 100%;
        }
        .form-row > .form-group { flex: 1; min-width: 0; }
        
        /* Inputs & Labels */
        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        select, input[type="datetime-local"], textarea.ai-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            color: var(--text-main);
            background-color: var(--input-bg);
            transition: all 0.2s ease;
            outline: none;
            min-height: 48px;
            font-family: inherit;
        }
        textarea.ai-textarea {
            resize: vertical;
            min-height: 250px;
            line-height: 1.6;
        }
        select:focus, input[type="datetime-local"]:focus, textarea.ai-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        
        /* Buttons */
        .btn-primary {
            background-color: var(--btn-bg) !important;
            color: var(--btn-text) !important;
            border: none;
            padding: 14px 24px !important;
            min-height: 48px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary:hover { 
            background-color: var(--btn-hover) !important;
        }
        .btn-primary:active { transform: translateY(1px); }
        
        .btn-copy {
            background-color: transparent !important;
            color: var(--primary) !important;
            border: 1px solid var(--border) !important;
            padding: 8px 16px !important;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-copy:hover { 
            background-color: var(--row-hover) !important; 
            border-color: var(--primary) !important;
        }
        
        /* Output Section */
        .output-section { margin-top: 36px; display: none; width: 100%; }
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .output-header h3 { margin: 0; font-size: 1.15rem; font-weight: 600; color: var(--text-main); }
        
        /* Error Message */
        .error-message {
            color: var(--danger);
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            font-size: 14px;
        }
        
        /* Table Styles */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            max-height: 450px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: left;
        }
        .data-table th, .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .data-table th {
            background-color: var(--input-bg);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 11px;
            position: sticky;
            top: 0;
            z-index: 1;
            box-shadow: 0 1px 0 var(--border);
        }
        .data-table tr:nth-child(even) { background-color: var(--row-alt); }
        .data-table tr:hover { background-color: var(--row-hover); }
        
        /* Sidebar Nav Items */
        .custom-tab {
            text-align: left;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: rgba(255,255,255,0.7);
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .custom-tab:hover {
            color: #ffffff;
            background: rgba(255,255,255,0.05);
        }
        .custom-tab.active {
            color: #ffffff;
            background: rgba(136, 171, 165, 0.1);
            border-color: var(--sidebar-active-border);
            box-shadow: 0 0 12px var(--sidebar-active-glow), inset 0 0 8px var(--sidebar-active-glow);
        }
        .custom-tab.placeholder {
            opacity: 0.6;
        }
        .custom-tab.placeholder::after {
            content: "Soon";
            font-size: 10px;
            background: #ffffff;
            color: #000000;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 700;
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .layout-wrapper { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 16px; }
            .main-content { padding: 16px; }
            .app-container { padding: 24px 20px; }
            .form-row { flex-direction: column; gap: 0; }
            .form-row > .form-group { margin-bottom: 20px; }
        }
    </style>
    <script>
        // Prevent FOUC
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>
    <div class="layout-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Angel Quant</h1>
            </div>
            
            <nav class="sidebar-nav">
                <div id="tab-live" class="custom-tab active">CSV Candle Data</div>
                <div id="tab-ai" class="custom-tab">AI Market Intelligence</div>
                <div id="tab-chart" class="custom-tab placeholder">Chart Window</div>
                <div id="tab-backtest" class="custom-tab placeholder">Backtesting</div>
            </nav>
            
            <div style="margin-top: auto;">
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle Theme" style="width: 100%;">🌙 Toggle Theme</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="app-container">
                <!-- Tab 1: CSV Candle Data -->
                <div id="content-live">
                    <div class="card">
                        <div class="card-header">CSV Candle Data</div>
                        <div class="card-body">
                            <form id="fetchForm">
                                <div class="form-row">
                                    <div class="form-group">
                        <label for="symbol">Index</label>
                        <select id="symbol" required>
                            <option value="NIFTY">NIFTY</option>
                            <option value="BANK NIFTY">BANK NIFTY</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="interval">Interval</label>
                        <select id="interval" required>
                            <option value="1m">1 Minute</option>
                            <option value="3m">3 Minutes</option>
                            <option value="5m" selected>5 Minutes</option>
                            <option value="10m">10 Minutes</option>
                            <option value="15m">15 Minutes</option>
                            <option value="30m">30 Minutes</option>
                            <option value="1h">1 Hour</option>
                            <option value="1d">1 Day</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="startDate">Start Date</label>
                        <input type="datetime-local" id="startDate" required>
                    </div>
                    <div class="form-group">
                        <label for="endDate">End Date</label>
                        <input type="datetime-local" id="endDate" required>
                    </div>
                </div>
                                <button type="submit" id="submitBtn" class="btn-primary">Fetch Data</button>
                                <div id="errorMsg" class="error-message"></div>
                            </form>
                        </div>
                    </div>

                    <div class="output-section card" id="outputSection" style="margin-top: 24px;">
                        <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="margin: 0;">Market Data Feed</span>
                            <button type="button" class="btn-copy" id="copyBtn" style="background: var(--surface) !important; color: var(--text-main) !important; border: 1px solid var(--border) !important;">Copy</button>
                        </div>
                        <div class="card-body" style="padding: 0;">
                            <div id="tableContainer" class="table-responsive" style="border: none; border-radius: 0;"></div>
                            <textarea id="csvOutput" style="display: none;" readonly></textarea>
                        </div>
                    </div>
        </div>

        <!-- Tab 2: AI Market Intelligence -->
        <div id="content-ai" style="display: none;">
            <div class="card">
                <div class="card-header">AI Market Intelligence</div>
                <div class="card-body">
                    <div class="form-row" style="margin-bottom: 24px; align-items: flex-end;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label for="aiSymbol">Index</label>
                            <select id="aiSymbol">
                                <option value="NIFTY">NIFTY</option>
                                <option value="BANK NIFTY">BANK NIFTY</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <button type="button" id="aiAnalyzeBtn" class="btn-primary">Initialize AI Analysis</button>
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="aiOutput">Live Intelligence Report</label>
                        <textarea id="aiOutput" class="ai-textarea" placeholder="Awaiting telemetry... AI Analysis will appear here." readonly></textarea>
                    </div>
                </div>
            </div>
        </div>
            </div>
        </main>
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}?t={{ range(1, 999999) | random }}" defer></script>
</body>
</html>
