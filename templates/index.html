<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Quant Data Fetcher</title>
    <style>
        /* Modern Color Palette & Base */
        :root {
            color-scheme: light;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f3f4f6;
            --surface: rgba(255, 255, 255, 0.85);
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --border: #d1d5db;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --row-alt: #f9fafb;
            --row-hover: #f3f4f6;
            --blob-opacity: 0.4;
        }
        
        /* Dark Theme Overrides */
        [data-theme="dark"] {
            color-scheme: dark;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --bg-color: #111827;
            --surface: rgba(31, 41, 55, 0.85);
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --border: #374151;
            --success: #10b981;
            --success-hover: #059669;
            --row-alt: #111827;
            --row-hover: #374151;
            --blob-opacity: 0.15;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.5;
        }
        .container {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 12px;
        }
        h1 { 
            margin-top: 0; 
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }
        .theme-toggle {
            background: transparent;
            color: var(--text-main);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px;
            width: auto;
            box-shadow: none;
        }
        .theme-toggle:hover {
            background: transparent;
            box-shadow: none;
            transform: scale(1.1);
        }
        
        /* Form Layout */
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }
        .form-row {
            display: flex;
            gap: 20px;
        }
        .form-row > .form-group { flex: 1; }
        
        /* Inputs & Labels */
        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-main);
        }
        select, input[type="datetime-local"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            color: var(--text-main);
            background-color: var(--surface);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        select:focus, input[type="datetime-local"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }
        
        /* Buttons */
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }
        button:hover { 
            background-color: var(--primary-hover); 
            box-shadow: 0 6px 8px -1px rgba(37, 99, 235, 0.3);
        }
        button:active { transform: scale(0.98); }
        button:disabled { 
            background-color: #9ca3af; 
            cursor: not-allowed; 
            transform: none; 
            box-shadow: none;
        }
        
        /* Output Section */
        .output-section { margin-top: 30px; display: none; }
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .output-header h3 { margin: 0; font-size: 1.25rem; }
        .btn-copy {
            background-color: var(--success);
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
            box-shadow: none;
        }
        .btn-copy:hover { background-color: var(--success-hover); box-shadow: none; }
        
        /* Error Message */
        .error-message {
            color: var(--danger);
            background-color: #fef2f2;
            border: 1px solid #f87171;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            font-size: 14px;
        }
        
        /* Table Styles */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            max-height: 400px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: left;
        }
        .data-table th, .data-table td {
            padding: 10px 16px;
            border-bottom: 1px solid #e5e7eb;
            white-space: nowrap;
        }
        .data-table th {
            background-color: var(--bg-color);
            color: var(--text-muted);
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .data-table tr:nth-child(even) { background-color: var(--row-alt); }
        .data-table tr:hover { background-color: var(--row-hover); }
        
        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            body { margin: 0; padding: 10px; }
            .container { padding: 20px 15px; box-shadow: none; border-radius: 12px; }
            .header-container { margin-bottom: 20px; }
            h1 { font-size: 1.3rem; }
            .form-row { flex-direction: column; gap: 0; }
            .output-header { flex-direction: column; align-items: stretch; gap: 15px; }
            .btn-copy { width: 100%; }
        }

        /* Mesh Background */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden;
            z-index: -1;
            transition: background-color 0.3s ease;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: var(--blob-opacity);
            will-change: transform;
            animation: float 15s infinite alternate ease-in-out;
        }
        .color-1 { background: linear-gradient(135deg, #3b82f6, #8b5cf6); width: 50vw; height: 50vw; top: -10%; left: -10%; animation-delay: 0s; }
        .color-2 { background: linear-gradient(135deg, #ec4899, #f43f5e); width: 60vw; height: 60vw; bottom: -20%; right: -10%; animation-delay: -3s; }
        .color-3 { background: linear-gradient(135deg, #10b981, #06b6d4); width: 45vw; height: 45vw; top: 40%; left: 40%; animation-delay: -7s; }
        .color-4 { background: linear-gradient(135deg, #8b5cf6, #ec4899); width: 40vw; height: 40vw; bottom: 10%; left: -10%; animation-delay: -11s; }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(5vw, 10vh) scale(1.1); }
            66% { transform: translate(-10vw, 5vh) scale(0.9); }
            100% { transform: translate(5vw, -5vh) scale(1.05); }
        }
    </style>
    <script>
        // Prevent FOUC (Flash of Unstyled Content) by setting theme early
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>
    <div class="mesh-bg">
        <div class="blob color-1"></div>
        <div class="blob color-2"></div>
        <div class="blob color-3"></div>
        <div class="blob color-4"></div>
    </div>

    <div class="container">
        <div class="header-container">
            <h1>Live Data Fetcher</h1>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle Theme">🌙</button>
        </div>
        <form id="fetchForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="symbol">Index</label>
                    <select id="symbol" required>
                        <option value="NIFTY">NIFTY</option>
                        <option value="BANK NIFTY">BANK NIFTY</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="interval">Interval</label>
                    <select id="interval" required>
                        <option value="1m">1 Minute</option>
                        <option value="3m">3 Minutes</option>
                        <option value="5m" selected>5 Minutes</option>
                        <option value="10m">10 Minutes</option>
                        <option value="15m">15 Minutes</option>
                        <option value="30m">30 Minutes</option>
                        <option value="1h">1 Hour</option>
                        <option value="1d">1 Day</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="startDate">Start Date</label>
                    <input type="datetime-local" id="startDate" required>
                </div>
                <div class="form-group">
                    <label for="endDate">End Date</label>
                    <input type="datetime-local" id="endDate" required>
                </div>
            </div>
            <button type="submit" id="submitBtn">Fetch Data</button>
            <div id="errorMsg" class="error-message"></div>
        </form>

        <div class="output-section" id="outputSection">
            <div class="output-header">
                <h3>Result</h3>
                <button type="button" class="btn-copy" id="copyBtn">Copy as CSV</button>
            </div>
            <div id="tableContainer" class="table-responsive"></div>
            <textarea id="csvOutput" style="display: none;" readonly></textarea>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}?t={{ range(1, 999999) | random }}" defer></script>
</body>
</html>
